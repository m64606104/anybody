<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 白色背景 -->
  <rect width="100" height="100" fill="#ffffff" rx="20"/>
  
  <!-- 深蓝色对话框主体 -->
  <path d="M 25 30 L 75 30 L 75 60 L 50 60 L 40 70 L 40 60 L 25 60 Z" 
        fill="#1e3a8a" 
        stroke="#1e3a8a" 
        stroke-width="2"/>
  
  <!-- 对话框尖角演变成的星星/画笔 -->
  <g transform="translate(40, 70)">
    <!-- 星星形状 -->
    <path d="M 0,-8 L 2,-2 L 8,-2 L 3,2 L 5,8 L 0,4 L -5,8 L -3,2 L -8,-2 L -2,-2 Z" 
          fill="#fbbf24" 
          stroke="#fbbf24" 
          stroke-width="0.5"/>
  </g>
  
  <!-- 对话框内的三个点（表示对话/交流） -->
  <circle cx="40" cy="45" r="3" fill="#ffffff" opacity="0.9"/>
  <circle cx="50" cy="45" r="3" fill="#ffffff" opacity="0.9"/>
  <circle cx="60" cy="45" r="3" fill="#ffffff" opacity="0.9"/>
</svg>
